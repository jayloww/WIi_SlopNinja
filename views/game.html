<div class="game-screen">
  <canvas id="game-canvas"></canvas>
  <canvas id="slash-canvas"></canvas>
  <div class="game-hud">
    <div class="game-hud-left">
      <div class="hud-label">SCORE</div>
      <div class="hud-score" id="game-score">0</div>
      <div class="hud-highscore">HIGHSCORE <span id="game-highscore">0</span></div>
    </div>

    <div class="game-hud-right">
      <div class="hud-label">TIME</div>
      <div class="hud-timer-pill"><span id="game-timer">00:00</span></div>
      <div class="hud-progress">
        <div class="hud-progress-fill" id="game-progress"></div>
      </div>
    </div>
  </div>

  <div id="game-end-screen">
    <div class="end-card">
      <div class="end-title">TIME'S UP</div>
      <div class="end-score-label">SCORE</div>
      <div class="end-score-value" id="end-score-value">0</div>
      <div class="end-highscore">HIGHSCORE &nbsp;<span id="end-highscore-value">0</span></div>
      <div class="end-buttons">
        <button class="end-btn" onclick="restartGame()">Play Again</button>
        <button class="end-btn end-btn-secondary" onclick="endGoToMenu()">Wii Menu</button>
      </div>
    </div>
  </div>
</div>
